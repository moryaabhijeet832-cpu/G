<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h1>Clinic AI Assistant</h1>
      <p>Book appointments and ask clinic-related questions</p>
    </div>
<a href="appointment.html" class="main-btn">Book Appointment</a>

<a href="doctor-login.html" class="doctor-login-btn">Doctor Login</a>


<div id="appointmentForm" class="appointment-form" style="display: none;">
  <h3>Book Doctor Appointment</h3>

  <input id="patientName" type="text" placeholder="Patient Name">
  <input id="patientPhone" type="text" placeholder="Phone Number">

  <select id="doctorType">
    <option value="">Select Doctor</option>
    <option value="General Physician">General Physician</option>
    <option value="Cardiologist">Cardiologist</option>
    <option value="Dermatologist">Dermatologist</option>
    <option value="Dentist">Dentist</option>
    <option value="Pediatrician">Pediatrician</option>
  </select>

  <input id="appointmentDate" type="date">
  <input id="appointmentTime" type="time">

  <button onclick="sendToWhatsApp()">Send on WhatsApp</button>
</div>
    <div id="chatBox" class="chat-box">
      <div class="bot-message">
        Hello! I am your Clinic Assistant. How can I help you?
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message..."
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
